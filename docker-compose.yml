# Slim control-plane backends: MLflow (tracking + Prompt Registry, iter 1) and Arize Phoenix
# (online observability + drift, iter 5a).
# Host processes talk to it over localhost:5050 HTTP — NO shared filesystem (rule: --serve-artifacts
# so clients fetch artifacts via HTTP, avoiding host/container path-mismatch). Containers never
# reach OpenAI; LLM egress is host-only (tech-decisions: execution boundary).
# Host port is 5050, not 5000: macOS ControlCenter (AirPlay Receiver) squats on 5000.
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.1
    ports:
      - "5050:5000"
    volumes:
      - ./mlflow-data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000

  # Online observability (iter 5a): spans arrive over OTLP-HTTP on the same port as the UI
  # (/v1/traces) and persist in sqlite under the volume — symmetric to MLflow. Only the HTTP
  # port is published (no gRPC), and the container never reaches OpenAI (execution boundary).
  phoenix:
    image: arizephoenix/phoenix:17.17.0
    ports:
      - "6006:6006"
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - ./phoenix-data:/mnt/data

  # Continuous-evaluation schedule (iter 6b): deployments + the interval scheduler live here —
  # in Prefect 3 scheduling is strictly server-side (the ephemeral/in-process API deliberately
  # ships without the scheduler service). Flows still EXECUTE on the host: `make loop` runs the
  # serve()-runner that polls this API and executes ticks in the uv env, so the container never
  # runs triage and never reaches OpenAI (execution boundary). Tag pinned to the lib version.
  prefect:
    image: prefecthq/prefect:3.7.8-python3.12
    ports:
      - "4200:4200"
    environment:
      - PREFECT_HOME=/data
      - PREFECT_SERVER_ANALYTICS_ENABLED=false
    volumes:
      - ./prefect-data:/data
    command: prefect server start --host 0.0.0.0 --port 4200

  # Control-plane dashboard (iter 7): one read-only Streamlit page collecting the five
  # lifecycle proofs. Reads MLflow/Phoenix/Prefect over the compose network; the host JSONL
  # logs (SLO, promotions) come in through a read-only mount — the documented exception to
  # "no shared FS" (a render of append-only logs, not an artifact path; nothing is written
  # back). ./app is mounted read-only too, so the panel always renders the working tree.
  # The container never reaches OpenAI: the panel is not on the LLM path (egress stays
  # host-only, rule 5 posture intact).
  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PHOENIX_ENDPOINT=http://phoenix:6006
      - PREFECT_API_URL=http://prefect:4200/api
    volumes:
      - ./app:/srv/app:ro
      - ./logs:/srv/logs:ro
